services:
  mysql:
    image: mysql:8.0
    container_name: tdtp_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: '${DB_ROOT_PASSWORD}'
      MYSQL_DATABASE: '${DB_NAME}'
      MYSQL_USER: '${DB_USER}'
      MYSQL_PASSWORD: '${DB_PASSWORD}'
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - tdtp_network

  php:
    build: .
    container_name: tdtp_php
    restart: always
    ports:
      - "${APP_PORT:-8500}:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - mysql
    networks:
      - tdtp_network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: tdtp_phpmyadmin
    restart: always
    environment:
      PMA_HOST: '${PMA_HOST}'
      PMA_USER: '${DB_USER}'
      PMA_PASSWORD: '${DB_PASSWORD}'
    ports:
      - "${PMA_PORT:-8001}:80"
    depends_on:
      - mysql
    networks:
      - tdtp_network

volumes:
  mysql_data:

networks:
  tdtp_network:
    driver: bridge